name: Rust CI

# Проверки идут в dev, где ведётся разработка, и в master - там они последняя
# защита перед сборкой релиза. Плюс на каждый pull request dev -> master.
on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  check:
    # Свой раннер: зависимости и кэш сборки уже на месте, а у облачного жёсткий
    # лимит времени на задачу, в который сборка truemail не укладывается.
    runs-on: [self-hosted, linux, x64]
    env:
      # Системный OpenSSL вместо vendored: иначе он собирается из исходников
      # при каждом изменении окружения и съедает минуты на пустом месте.
      OPENSSL_NO_VENDOR: 1
    steps:
      - uses: actions/checkout@v4
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace --locked

  windows:
    # Нативный host-runner обязателен: Tauri/NSIS и WebView2 нельзя проверить
    # внутри Linux-контейнера. Стандартные метки GitVerse назначает при
    # регистрации Windows x64 runner.
    runs-on: [self-hosted, windows, x64]
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: |
          .\scripts\dev.ps1 -Check
          cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Tests
        run: |
          .\scripts\dev.ps1 -Check
          cargo test --workspace --locked

  macos:
    # Нативный arm64 host-runner (Apple Silicon): macOS-специфичные ветки
    # (keychain, tray, autostart) и Tauri-бандл нельзя проверить в Linux-раннере.
    runs-on: [self-hosted, macos, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Tests
        run: cargo test --workspace --locked
