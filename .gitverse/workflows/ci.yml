name: Rust CI

# Проверки идут в dev (разработка) и на каждый pull request dev -> master.
# На master ci не дублируем: там release.yml всё равно собирает и проверяет.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Новый push в ту же ветку отменяет предыдущий незавершённый прогон - очередь
# на единственном windows-раннере не копится.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Свой раннер: зависимости и кэш сборки уже на месте, а у облачного жёсткий
    # лимит времени на задачу, в который сборка truemail не укладывается.
    runs-on: [self-hosted, linux, x64]
    env:
      # Системный OpenSSL вместо vendored: иначе он собирается из исходников
      # при каждом изменении окружения и съедает минуты на пустом месте.
      OPENSSL_NO_VENDOR: 1
    steps:
      - uses: actions/checkout@v4
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # Каждый тест хранилища открывает свою базу SQLCipher, а это key
      # derivation на каждое соединение пула. В LXC-раннере с тремя
      # параллельными job-ами полный веер тестов упирается в CPU и соединения
      # начинают ждать дольше таймаута пула. Четырёх потоков хватает, чтобы
      # прогон оставался быстрым и не зависел от соседних сборок.
      - name: Tests
        run: cargo test --workspace --locked -- --test-threads=4

  windows:
    # Нативный host-runner обязателен: Tauri/NSIS и WebView2 нельзя проверить
    # внутри Linux-контейнера. Стандартные метки GitVerse назначает при
    # регистрации Windows x64 runner.
    runs-on: [self-hosted, windows, x64]
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: |
          .\scripts\dev.ps1 -Check
          cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Tests
        run: |
          .\scripts\dev.ps1 -Check
          cargo test --workspace --locked

  macos:
    # Нативный arm64 host-runner (Apple Silicon): macOS-специфичные ветки
    # (keychain, tray, autostart) и Tauri-бандл нельзя проверить в Linux-раннере.
    runs-on: [self-hosted, macos, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Tests
        run: cargo test --workspace --locked
